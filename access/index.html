<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martha Isabel González Ramírez - Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: white;
            color: #667eea;
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        .access-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 60px 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .name {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #f8f9ff;
        }

        input::placeholder {
            color: #999;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .success-message.show {
            opacity: 1;
        }

        .info-box {
            background: #f5f7ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 6px;
            margin-top: 24px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 16px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .access-container {
                padding: 40px 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 14px;
            }

            .language-toggle {
                top: 10px;
                right: 10px;
            }

            .lang-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="language-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>

    <div class="access-container">
        <div class="header">
            <div class="name">Martha Isabel González Ramírez</div>
            <h1 id="title">Hello & Welcome!</h1>
            <p id="subtitle">To my website</p>
        </div>

        <form id="accessForm">
            <div class="form-group">
                <label for="name" id="label-name">Full Name *</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Your full name"
                    required
                />
            </div>

            <div class="form-group">
                <label for="affiliation" id="label-affiliation">Affiliation *</label>
                <input
                    type="text"
                    id="affiliation"
                    name="affiliation"
                    placeholder="University, institution or company"
                    required
                />
            </div>

            <div class="form-group">
                <label for="email" id="label-email">Contact Email *</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your@email.com"
                    required
                />
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Access My Research</button>

            <div class="loading" id="loading">
                <span class="spinner"></span>
                <span id="loading-text">Sending information...</span>
            </div>

            <div class="success-message" id="successMessage">
                <span id="success-text">✓ Confirmation email sent! Check your inbox.</span>
            </div>
        </form>

        <div class="info-box">
            <strong id="privacy-title">🔒 Your Privacy Matters</strong><br>
            <span id="privacy-text">Your information will be used only to contact you about collaboration and research opportunities.</span>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Hello & Welcome!",
                subtitle: "To my website",
                labelName: "Full Name *",
                placeholderName: "Your full name",
                labelAffiliation: "Affiliation *",
                placeholderAffiliation: "University, institution or company",
                labelEmail: "Contact Email *",
                submitBtn: "Access My Research",
                loadingText: "Sending information...",
                successText: "✓ Confirmation email sent! Check your inbox.",
                privacyTitle: "🔒 Your Privacy Matters",
                privacyText: "Your information will be used only to contact you about collaboration and research opportunities."
            },
            es: {
                title: "¡Hola y Bienvenido!",
                subtitle: "A mi sitio web",
                labelName: "Nombre Completo *",
                placeholderName: "Tu nombre completo",
                labelAffiliation: "Afiliación *",
                placeholderAffiliation: "Universidad, institución o empresa",
                labelEmail: "Correo de Contacto *",
                submitBtn: "Acceder a mi Investigación",
                loadingText: "Enviando información...",
                successText: "✓ ¡Email de confirmación enviado! Revisa tu bandeja.",
                privacyTitle: "🔒 Tu Privacidad es Importante",
                privacyText: "Tu información será utilizada únicamente para contactarte sobre oportunidades de colaboración e investigación."
            }
        };

        let currentLanguage = 'en';
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwh-bZTkMt5xOlECyCR7Elzwy_EM1SWKiaXmNFFe-USkdq8WlLR2DZf3cOXNgy5-Sm/exec";

        const form = document.getElementById('accessForm');
        const loading = document.getElementById('loading');
        const successMessage = document.getElementById('successMessage');
        const nameInput = document.getElementById('name');
        const affiliationInput = document.getElementById('affiliation');
        const emailInput = document.getElementById('email');

        // Language toggle
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLanguage = btn.dataset.lang;
                updateLanguage();
            });
        });

        function updateLanguage() {
            const t = translations[currentLanguage];
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('label-name').textContent = t.labelName;
            nameInput.placeholder = t.placeholderName;
            document.getElementById('label-affiliation').textContent = t.labelAffiliation;
            affiliationInput.placeholder = t.placeholderAffiliation;
            document.getElementById('label-email').textContent = t.labelEmail;
            document.getElementById('submit-btn').textContent = t.submitBtn;
            document.getElementById('loading-text').textContent = t.loadingText;
            document.getElementById('success-text').textContent = t.successText;
            document.getElementById('privacy-title').textContent = t.privacyTitle;
            document.getElementById('privacy-text').textContent = t.privacyText;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!nameInput.value.trim() || !affiliationInput.value.trim() || !emailInput.value.trim()) {
                alert(currentLanguage === 'en' ? 'Please complete all fields' : 'Por favor completa todos los campos');
                return;
            }

            loading.style.display = 'block';
            form.querySelector('.submit-btn').disabled = true;

            try {
                console.log('Sending request to:', APPS_SCRIPT_URL);

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: nameInput.value,
                        affiliation: affiliationInput.value,
                        email: emailInput.value,
                        language: currentLanguage
                    })
                });

                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Response result:', result);

                if (result.success) {
                    loading.style.display = 'none';
                    successMessage.classList.add('show');
                    form.style.opacity = '0.5';

                    localStorage.setItem('accessEmail', emailInput.value);

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    throw new Error(result.message || 'Server returned error');
                }
            } catch (error) {
                loading.style.display = 'none';
                form.querySelector('.submit-btn').disabled = false;
                console.error('Full error object:', error);
                console.error('Error name:', error.name);
                console.error('Error message:', error.message);

                const errorMsg = error.message || 'Unknown error';
                alert(currentLanguage === 'en'
                    ? `Error: ${errorMsg}\n\nOpen browser console (F12) for details.`
                    : `Error: ${errorMsg}\n\nAbre la consola del navegador (F12) para más detalles.`);
            }
        });

        // Check if already confirmed
        if (localStorage.getItem('accessEmail')) {
            window.location.href = '/';
        }

        updateLanguage();
    </script>
</body>
</html>
