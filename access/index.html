<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martha Isabel González Ramírez - Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: white;
            color: #667eea;
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        .access-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 60px 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .name {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #f8f9ff;
        }

        input::placeholder {
            color: #999;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .info-box {
            background: #f5f7ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 6px;
            margin-top: 24px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .access-container {
                padding: 40px 24px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="language-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>

    <div class="access-container">
        <div class="header">
            <div class="name">Martha Isabel González Ramírez</div>
            <h1 id="title">Hello & Welcome!</h1>
            <p id="subtitle">To my website</p>
        </div>

        <form id="accessForm" action="https://formspree.io/f/meeyrobk" method="POST">
            <div class="form-group">
                <label for="name" id="label-name">Full Name *</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Your full name"
                    required
                />
            </div>

            <div class="form-group">
                <label for="email" id="label-email">Email *</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your@email.com"
                    required
                />
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Access My Research</button>
        </form>

        <div class="info-box">
            <strong id="privacy-title">🔒 Privacy</strong><br>
            <span id="privacy-text">Your information helps me connect with colleagues interested in my research.</span>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Hello & Welcome!",
                subtitle: "To my website",
                labelName: "Full Name *",
                placeholderName: "Your full name",
                labelEmail: "Email *",
                submitBtn: "Access My Research",
                privacyTitle: "🔒 Privacy",
                privacyText: "Your information helps me connect with colleagues interested in my research."
            },
            es: {
                title: "¡Hola y Bienvenido!",
                subtitle: "A mi sitio web",
                labelName: "Nombre Completo *",
                placeholderName: "Tu nombre completo",
                labelEmail: "Email *",
                submitBtn: "Acceder a mi Investigación",
                privacyTitle: "🔒 Privacidad",
                privacyText: "Tu información me ayuda a conectar con colegas interesados en mi investigación."
            }
        };

        let currentLanguage = 'en';

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLanguage = btn.dataset.lang;
                updateLanguage();
            });
        });

        function updateLanguage() {
            const t = translations[currentLanguage];
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('label-name').textContent = t.labelName;
            document.getElementById('name').placeholder = t.placeholderName;
            document.getElementById('label-email').textContent = t.labelEmail;
            document.getElementById('submit-btn').textContent = t.submitBtn;
            document.getElementById('privacy-title').textContent = t.privacyTitle;
            document.getElementById('privacy-text').textContent = t.privacyText;
        }

        updateLanguage();
    </script>
</body>
</html>
