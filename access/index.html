<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martha Isabel González Ramírez - Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .access-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 60px 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .name {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #f8f9ff;
        }

        input::placeholder {
            color: #999;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .success-message {
            display: none;
            text-align: center;
        }

        .success-message h2 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .success-message p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .enter-btn {
            display: inline-block;
            padding: 16px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .info-box {
            background: #f5f7ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 6px;
            margin-top: 24px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .access-container {
                padding: 40px 24px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="access-container">
        <div class="header">
            <div class="name">Martha Isabel González Ramírez</div>
            <h1>Hello & Welcome!</h1>
            <p>To my website</p>
        </div>

        <div id="formDiv">
            <form id="accessForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Your full name"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="your@email.com"
                        required
                    />
                </div>

                <button type="submit" class="submit-btn">Access My Research</button>
            </form>

            <div class="info-box">
                <strong>🔒 Privacy</strong><br>
                Your information helps me connect with colleagues interested in my research.
            </div>
        </div>

        <div id="successDiv" class="success-message">
            <h2>✓ Welcome!</h2>
            <p>Thank you for your information. Entering your site now...</p>
            <a href="https://migonzalezr.github.io/" class="enter-btn">Enter My Site →</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('accessForm');
        const formDiv = document.getElementById('formDiv');
        const successDiv = document.getElementById('successDiv');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            // Guardar en localStorage
            localStorage.setItem('visitorName', name);
            localStorage.setItem('visitorEmail', email);
            localStorage.setItem('visitTime', new Date().toLocaleString());
            
            // Mostrar mensaje de éxito
            formDiv.style.display = 'none';
            successDiv.style.display = 'block';
            
            // Redirigir después de 2 segundos
            setTimeout(() => {
                window.location.href = 'https://migonzalezr.github.io/';
            }, 2000);
        });

        // Si ya visitó antes, ir directo al sitio
        if (localStorage.getItem('visitorEmail')) {
            window.location.href = 'https://migonzalezr.github.io/';
        }
    </script>
</body>
</html>
