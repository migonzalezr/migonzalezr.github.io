---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    
    <!-- Access Gate Redirect Script -->
    <script>
      // Check if user has confirmed email via access gate
      // Redirect to /access/ if not confirmed and not already on access page
      (function() {
        var currentPath = window.location.pathname;
        var isAccessPage = currentPath === '/access/' || currentPath.endsWith('/access/index.html');
        var isAccessConfirmed = localStorage.getItem('accessEmail');
        
        if (!isAccessPage && !isAccessConfirmed) {
          window.location.href = '/access/';
        }
      })();
    </script>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

  </body>
</html>
